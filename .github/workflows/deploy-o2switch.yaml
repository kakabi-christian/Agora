name: Deploy to O2Switch

on:
  push:
    branches:
      - master
      - main
      - feat/deploiment-auto
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - master
      - main
      - feat/deploiment-auto

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json, bcmath

      - name: Copy .env for deployment
        run: |
          cd agoraCooperative
          cat > .env << EOF
          APP_NAME="Agora Cooperative"
          APP_ENV=production
          APP_KEY=${{ secrets.LARAVEL_APP_KEY }}
          APP_DEBUG=false
          APP_URL=${{ secrets.APP_URL }}

          LOG_CHANNEL=stack
          LOG_LEVEL=warning

          DB_CONNECTION=mysql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          CACHE_DRIVER=file
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=file
          EOF

      - name: Install dependencies
        run: |
          cd agoraCooperative
          composer install --prefer-dist --no-progress --no-interaction --no-dev

      - name: Generate key
        run: |
          cd agoraCooperative
          php artisan key:generate

      - name: Optimize application
        run: |
          cd agoraCooperative
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Create backend deployment package
        run: |
          mkdir -p backend-deploy
          tar -czf backend-deploy/agora-backend.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='tests' \
            --exclude='Test' \
            --exclude='Tests' \
            --exclude='.github' \
            --exclude='docker-compose.override.yml' \
            --exclude='Homestead.json' \
            --exclude='Homestead.yaml' \
            --exclude='.idea' \
            --exclude='.vscode' \
            --exclude='README.md' \
            --exclude='phpunit.xml' \
            --exclude='phpunit.xml.dist' \
            --exclude='.phpunit.result.cache' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --transform 's,^agoraCooperative/,,' \
            agoraCooperative/

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifact
          path: backend-deploy/agora-backend.tar.gz
          retention-days: 7

  deploy-frontend:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd AgoraFront/Frontend
          npm install --legacy-peer-deps

      - name: Build Angular application
        run: |
          cd AgoraFront/Frontend
          npm run build -- --configuration production

      - name: Create frontend deployment package
        run: |
          mkdir -p frontend-deploy
          tar -czf frontend-deploy/agora-frontend.tar.gz \
            -C AgoraFront/Frontend dist/
          ls -lh frontend-deploy/agora-frontend.tar.gz

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-artifact
          path: frontend-deploy/agora-frontend.tar.gz
          retention-days: 7

  deploy-to-o2switch:
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-artifact
          path: artifacts/backend

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-artifact
          path: artifacts/frontend

      - name: Display artifacts
        run: |
          echo "Backend artifact:"
          ls -lh artifacts/backend/
          echo "Frontend artifact:"
          ls -lh artifacts/frontend/

      - name: Extract artifacts locally
        run: |
          mkdir -p deploy/backend deploy/frontend
          
          # Extract backend
          cd deploy/backend
          tar -xzf ../../artifacts/backend/agora-backend.tar.gz
          
          # Extract frontend and flatten structure
          cd ../frontend
          tar -xzf ../../artifacts/frontend/agora-frontend.tar.gz
          
          # Debug: show what was extracted
          echo "Files after extraction:"
          find . -type f | head -20
          
          # Move files from dist/agoraCooperativefrontend/browser/ to root
          if [ -d "dist/agoraCooperativefrontend/browser" ]; then
            echo "Moving files from dist/agoraCooperativefrontend/browser/ to root..."
            # Move all files including hidden ones
            mv dist/agoraCooperativefrontend/browser/* . 2>/dev/null || true
            mv dist/agoraCooperativefrontend/browser/.* . 2>/dev/null || true
            # Clean up empty directories
            rm -rf dist/
            echo "Files moved successfully"
          elif [ -d "dist" ]; then
            echo "Different dist structure found, checking contents..."
            find dist -type f | head -10
            # Try to find index.html and move from wherever it is
            INDEX_PATH=$(find dist -name "index.html" -type f | head -1)
            if [ -n "$INDEX_PATH" ]; then
              INDEX_DIR=$(dirname "$INDEX_PATH")
              echo "Found index.html in: $INDEX_DIR"
              mv "$INDEX_DIR"/* . 2>/dev/null || true
              mv "$INDEX_DIR"/.* . 2>/dev/null || true
              rm -rf dist/
            fi
          fi
          
          cd ../..
          
          # Copy .htaccess files (use simple versions for better compatibility)
          cp frontend-htaccess-simple/.htaccess deploy/frontend/.htaccess
          cp backend-htaccess-simple/.htaccess deploy/backend/.htaccess
          
          echo "Final extracted files and added .htaccess:"
          ls -la deploy/
          echo "Frontend files (first 20):"
          ls -la deploy/frontend/ | head -20
          echo "Backend files (first 20):"
          ls -la deploy/backend/ | head -20

      - name: Test FTP connectivity
        run: |
          echo "Testing FTP connectivity to ${{ secrets.O2SWITCH_FTP_HOST }}:21"
          timeout 30 nc -zv ${{ secrets.O2SWITCH_FTP_HOST }} 21 || echo "FTP port 21 connection failed"
          
          # Test the known O2Switch domain
          echo "Testing known O2Switch domain groupe4.cdwfs.net:21"
          timeout 30 nc -zv groupe4.cdwfs.net 21 || echo "groupe4.cdwfs.net FTP not reachable"
          
          echo "FTP connectivity test completed"

      - name: Deploy Backend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.O2SWITCH_FTP_HOST }}
          username: ${{ secrets.O2SWITCH_FTP_USER }}
          password: ${{ secrets.O2SWITCH_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./deploy/backend/
          server-dir: ${{ secrets.O2SWITCH_BACKEND_PATH }}/
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            **/tests/**
            **/Test/**
            **/Tests/**
            **/.env.example
        timeout-minutes: 10

      - name: Create composer install script
        run: |
          cat > composer-install.sh << 'EOF'
          #!/bin/bash
          cd ${{ secrets.O2SWITCH_BACKEND_PATH }}
          
          echo "Installing Composer dependencies..."
          composer install --no-dev --optimize-autoloader --no-interaction
          
          echo "Setting up Laravel..."
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          
          echo "Setting permissions..."
          chmod -R 755 .
          chmod -R 777 storage bootstrap/cache
          
          echo "Backend setup completed!"
          EOF

      - name: Upload and execute composer install script
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.O2SWITCH_FTP_HOST }}
          username: ${{ secrets.O2SWITCH_FTP_USER }}
          password: ${{ secrets.O2SWITCH_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./
          server-dir: ${{ secrets.O2SWITCH_BACKEND_PATH }}/
          log-level: minimal
          exclude: |
            **/*
            !composer-install.sh

      - name: Deploy Frontend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.O2SWITCH_FTP_HOST }}
          username: ${{ secrets.O2SWITCH_FTP_USER }}
          password: ${{ secrets.O2SWITCH_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./deploy/frontend/
          server-dir: ${{ secrets.O2SWITCH_FRONTEND_PATH }}/
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
        timeout-minutes: 10

      - name: Deployment notification
        if: always()
        run: |
          echo "Deployment completed at $(date)"
          if [ "${{ job.status }}" == "success" ]; then
            echo "✓ Deployment successful!"
            echo "Backend URL: ${{ secrets.BACKEND_URL }}"
            echo "Frontend URL: ${{ secrets.FRONTEND_URL }}"
          else
            echo "✗ Deployment failed!"
          fi
