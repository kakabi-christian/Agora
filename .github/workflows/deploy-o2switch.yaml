name: Deploy to O2Switch

on:
  push:
    branches:
      - main
      - master
      - feat/deploiment-auto

jobs:

# =========================
# BACKEND LARAVEL
# =========================
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, gd, json, bcmath

      - name: Prepare Laravel .env
        run: |
          cd agoraCooperative
          cat > .env << EOF
          APP_NAME="Agora Cooperative"
          APP_ENV=production
          APP_KEY=${{ secrets.LARAVEL_APP_KEY }}
          APP_DEBUG=false
          APP_URL=${{ secrets.APP_URL }}

          DB_CONNECTION=mysql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          EOF

      - name: Install dependencies
        run: |
          cd agoraCooperative
          composer install --no-dev --optimize-autoloader --no-interaction

      - name: Optimize Laravel
        run: |
          cd agoraCooperative
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache


      - name: Prepare backend package
        run: |
          mkdir -p deploy/backend

          rsync -av \
            --exclude=".git" \
            --exclude="node_modules" \
            --exclude="tests" \
            agoraCooperative/ deploy/backend/

      - name: Upload backend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.O2SWITCH_FTP_HOST }}
          username: ${{ secrets.O2SWITCH_FTP_USER }}
          password: ${{ secrets.O2SWITCH_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./deploy/backend/
          server-dir: /public_html/groupe4/api/agoraCooperative/
          log-level: standard

# =========================
# FRONTEND ANGULAR
# =========================
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Angular dependencies
        run: |
          cd AgoraFront/Frontend
          npm install --legacy-peer-deps

      - name: Build Angular
        run: |
          cd AgoraFront/Frontend
          npm run build -- --configuration production

      - name: Prepare frontend package
        run: |
          mkdir -p deploy/frontend

          cp -r AgoraFront/Frontend/dist/*/browser/* deploy/frontend/

      - name: Upload frontend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.O2SWITCH_FTP_HOST }}
          username: ${{ secrets.O2SWITCH_FTP_USER }}
          password: ${{ secrets.O2SWITCH_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./deploy/frontend/
          server-dir: /public_html/groupe4/
          log-level: standard
