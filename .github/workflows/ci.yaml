name: CI

on:
  pull_request:
    branches:
      - develop
      - master
  push:
    branches:
      - develop
      - main
      - master

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: agora_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json, bcmath
          coverage: none

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');" || cd agoraCooperative && php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Install Dependencies
        run: cd agoraCooperative && composer install --prefer-dist --no-progress --no-interaction

      - name: Generate key
        run: cd agoraCooperative && php artisan key:generate

      - name: Directory Permissions
        run: cd agoraCooperative && chmod -R 777 storage bootstrap/cache

      - name: Create Database
        run: |
          mysql --host 127.0.0.1 --port 3306 -uroot -ppassword -e 'CREATE DATABASE IF NOT EXISTS agora_test;'

      - name: Run Migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: agora_test
          DB_USERNAME: root
          DB_PASSWORD: password
        run: cd agoraCooperative && php artisan migrate:fresh --force

      - name: Execute tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: agora_test
          DB_USERNAME: root
          DB_PASSWORD: password
        run: cd agoraCooperative && php artisan test

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql
          coverage: none

      - name: Install Dependencies
        run: cd agoraCooperative && composer install --prefer-dist --no-progress --no-interaction

      - name: Check PHP syntax
        run: cd agoraCooperative && find app -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Check code style (optional)
        run: |
          cd agoraCooperative
          if [ -f "vendor/bin/phpcs" ]; then
            vendor/bin/phpcs --standard=PSR12 app
          else
            echo "PHP_CodeSniffer not installed, skipping..."
          fi
        continue-on-error: true

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: AgoraFront/Frontend/package-lock.json

      - name: Install dependencies
        run: cd AgoraFront/Frontend && npm ci

      - name: Run tests
        run: cd AgoraFront/Frontend && npm run test -- --watch=false --browsers=ChromeHeadless
        continue-on-error: true

      - name: Build frontend
        run: cd AgoraFront/Frontend && npm run build -- --configuration production

  build:
    runs-on: ubuntu-latest
    needs: [tests, code-quality, frontend-tests]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json, bcmath
          coverage: none

      - name: Copy .env
        run: cd agoraCooperative && php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Install Dependencies
        run: cd agoraCooperative && composer install --prefer-dist --no-progress --no-interaction --no-dev

      - name: Generate key
        run: cd agoraCooperative && php artisan key:generate

      - name: Optimize application
        run: |
          cd agoraCooperative
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Create deployment artifact
        run: |
          mkdir -p deployment
          tar -czf deployment/agora-cooperative.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.github' \
            --exclude='docker-compose.override.yml' \
            --exclude='Homestead.json' \
            --exclude='Homestead.yaml' \
            --exclude='.idea' \
            --exclude='.vscode' \
            --exclude='.kiro' \
            --exclude='README.md' \
            --exclude='deployment' \
            agoraCooperative/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agora-cooperative-artifact
          path: deployment/agora-cooperative.tar.gz
          retention-days: 30

  docker-build-and-push:
    runs-on: ubuntu-latest
    needs: build
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop') && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: agora-cooperative-artifact
          path: deployment

      - name: Extract artifact
        run: |
          cd deployment
          tar -xzf agora-cooperative.tar.gz
          rm agora-cooperative.tar.gz

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: secrets.DOCKER_USERNAME != ''

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/agora-cooperative
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
        if: secrets.DOCKER_USERNAME != ''

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: deployment
          push: ${{ secrets.DOCKER_USERNAME != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        if: secrets.DOCKER_USERNAME != ''
