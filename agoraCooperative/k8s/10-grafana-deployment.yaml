apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: agora-cooperative
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      # Sécurité au niveau du Pod
      securityContext:
        runAsNonRoot: true
        runAsUser: 472 # ID utilisateur standard pour Grafana
        fsGroup: 472
      containers:
      - name: grafana
        image: grafana/grafana:10.0.3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 3000
        env:
        # On utilise des Secrets plutôt que des valeurs en dur
        - name: GF_SECURITY_ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: agora-app-secrets
              key: GRAFANA_ADMIN_USER
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: agora-app-secrets
              key: GRAFANA_ADMIN_PASSWORD
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
      volumes:
      - name: grafana-storage
        persistentVolumeClaim:
          claimName: grafana-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: agora-cooperative
spec:
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP