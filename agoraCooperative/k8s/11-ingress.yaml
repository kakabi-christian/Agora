apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agora-ingress
  namespace: agora-cooperative
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - agora.example.com
    - grafana.agora.example.com
    - prometheus.agora.example.com
    - kibana.agora.example.com
    secretName: agora-tls
  rules:
  - host: agora.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: agora-app-service
            port:
              number: 80
  - host: grafana.agora.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana-service
            port:
              number: 3000
  - host: prometheus.agora.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: prometheus-service
            port:
              number: 9090
  - host: kibana.agora.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kibana-service
            port:
              number: 5601
