# Blue Deployment (Version actuelle en production)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agora-app-blue
  namespace: agora-cooperative
  labels:
    app: agora-app
    version: blue
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agora-app
      version: blue
  template:
    metadata:
      labels:
        app: agora-app
        version: blue
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      imagePullSecrets:
      - name: docker-registry-secret
      containers:
      - name: app
        image: YOUR_DOCKERHUB_USERNAME/agora-cooperative:v1.0.0
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 9000
        envFrom:
        - configMapRef:
            name: agora-app-config
        env:
        - name: APP_KEY
          valueFrom:
            secretKeyRef:
              name: agora-app-secrets
              key: APP_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      - name: nginx
        image: nginx:1.25-alpine
        securityContext:
          allowPrivilegeEscalation: false
          runAsUser: 101
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config

---
