---
# Service qui pointe vers Blue ou Green
apiVersion: v1
kind: Service
metadata:
  name: agora-app-service-bg
  namespace: agora-cooperative
spec:
  type: ClusterIP
  selector:
    app: agora-app
    version: blue  # Changer à "green" pour basculer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP