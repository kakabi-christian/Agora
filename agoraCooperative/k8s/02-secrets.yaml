apiVersion: v1
kind: Secret
metadata:
  name: agora-app-secrets
  namespace: agora-cooperative
type: Opaque
stringData:
  APP_KEY: "base64:CHANGE_THIS_IN_PRODUCTION"
  DB_USERNAME: "agora_user"
  DB_PASSWORD: "password"
  MYSQL_ROOT_PASSWORD: "rootpassword"
---
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry-secret
  namespace: agora-cooperative
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: CHANGE_THIS_WITH_YOUR_DOCKER_CREDENTIALS
