apiVersion: apps/v1
kind: Deployment
metadata:
  name: agora-app
  namespace: agora-cooperative
  labels:
    app: agora-app
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agora-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: agora-app
        version: v1
    spec:
      imagePullSecrets:
      - name: docker-registry-secret
      initContainers:
      - name: wait-for-mysql
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z mysql-service 3306; do echo waiting for mysql; sleep 2; done;']
      containers:
      - name: app
        image: shady7777/agora-cooperative:latest
        ports:
        - containerPort: 9000
          name: php-fpm
        envFrom:
        - configMapRef:
            name: agora-app-config
        env:
        - name: APP_KEY
          valueFrom:
            secretKeyRef:
              name: agora-app-secrets
              key: APP_KEY
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: agora-app-secrets
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: agora-app-secrets
              key: DB_PASSWORD
        volumeMounts:
        - name: app-storage
          mountPath: /var/www/storage
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 9000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 9000
          initialDelaySeconds: 10
          periodSeconds: 5
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
        - name: app-storage
          mountPath: /var/www/storage
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: app-storage
        persistentVolumeClaim:
          claimName: app-storage-pvc
      - name: nginx-config
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: agora-app-service
  namespace: agora-cooperative
  labels:
    app: agora-app
spec:
  type: ClusterIP
  selector:
    app: agora-app
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  - port: 9000
    targetPort: 9000
    protocol: TCP
    name: php-fpm
