filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /var/www/storage/logs/*.log
    fields:
      app: agora-cooperative
      environment: docker
    fields_under_root: true
    multiline.pattern: '^\['
    multiline.negate: true
    multiline.match: after

output.logstash:
  hosts: ["logstash:5044"]

logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644
