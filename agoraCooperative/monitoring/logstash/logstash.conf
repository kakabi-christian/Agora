input {
  beats {
    port => 5044
  }
  
  tcp {
    port => 5000
    codec => json
  }
}

filter {
  # Parser les logs Laravel
  if [message] =~ /^\[/ {
    grok {
      match => { 
        "message" => "\[%{TIMESTAMP_ISO8601:timestamp}\] %{DATA:environment}\.%{DATA:level}: %{GREEDYDATA:log_message}" 
      }
    }
    
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }
  
  # Ajouter des tags pour faciliter le filtrage
  if [level] == "ERROR" or [level] == "error" {
    mutate {
      add_tag => [ "error" ]
    }
  }
  
  if [level] == "WARNING" or [level] == "warning" {
    mutate {
      add_tag => [ "warning" ]
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "laravel-logs-%{+YYYY.MM.dd}"
  }
  
  # Pour debug (optionnel)
  stdout {
    codec => rubydebug
  }
}
